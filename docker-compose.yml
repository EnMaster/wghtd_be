services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: wghtd_be-app
    container_name: wghtd_be-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_URL=https://example.com
    ports:
      - "${APP_PORT:-8001}:8001"
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8001
